<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思考ログ - 陰者の婚活</title>
  <meta name="description" content="「陰者の婚活」の思考ログページです。日々の雑感や婚活における思考プロセスのメモ書きを公開しています。">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* Styling for markdown elements inside the Notepad content window */
    #thought-markdown-content h1 {
      font-size: 18px;
      margin-bottom: 12px;
      border-bottom: 2px solid #808080;
      color: #000080;
      padding-bottom: 4px;
    }
    #thought-markdown-content h2 {
      font-size: 15px;
      margin-top: 18px;
      margin-bottom: 8px;
      border-bottom: 1px solid #808080;
      color: #000080;
      padding-bottom: 2px;
    }
    #thought-markdown-content p {
      margin-bottom: 10px;
      font-size: 13px;
    }
    #thought-markdown-content ul {
      margin-left: 20px;
      margin-bottom: 12px;
      list-style-type: square;
    }
    #thought-markdown-content li {
      margin-bottom: 4px;
      font-size: 13px;
    }
    /* Table styling for markdown tables */
    #thought-markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      margin-bottom: 15px;
      font-size: 12px;
    }
    #thought-markdown-content th, #thought-markdown-content td {
      border: 1px solid #808080;
      padding: 6px 10px;
      text-align: left;
    }
    #thought-markdown-content th {
      background-color: #000080;
      color: #ffffff;
      font-weight: bold;
    }
    #thought-markdown-content tr:nth-child(even) {
      background-color: #f0f0f0;
    }
  </style>
  <!-- Load marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <div class="layout">
    <!-- Header -->
    <header>
      <div class="wordart">陰者の婚活</div>
      <p class="subtitle-text">~~ 中高不登校、社交不安障害持ちの社不がマチアプに挑んだログ ~~</p>

      <div class="marquee-container">
        <div class="marquee-text">
          【更新情報】 2026/06/03：スペック表をシンプルに整理し、ごあいさつ文を更新しました！
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="columns">
      <!-- Sidebar Navigation (Modularized component) -->
      <sidebar-navigation></sidebar-navigation>

      <!-- Main Section -->
      <main>
        <!-- Thought Log Window -->
        <section class="win-window" id="thought-log-window">
          <div class="win-titlebar">
            <span>Thought.txt - メモ帳</span>
            <div class="win-title-buttons">
              <button class="win-btn">_</button>
              <button class="win-btn">?</button>
              <button class="win-btn">X</button>
            </div>
          </div>
          <div class="win-content">
            <!-- Content Area (White sheet of paper style) -->
            <div id="thought-markdown-content" style="max-height: 500px; overflow-y: auto; background-color: #fff; padding: 5px 10px; font-family: monospace; font-size: 13px; color: #000; line-height: 1.6;">
              <p style="color: #808080; text-align: center;">ログを読み込んでいます...</p>
            </div>
          </div>
        </section>

        <!-- Badges Row -->
        <div class="badges-container">
          <div class="badge-item badge-netscape">Netscape Navigator 4.0 OK</div>
          <div class="badge-item badge-ie">Internet Explorer 5.0 compatible</div>
          <div class="badge-item badge-notepad">Made with Notepad</div>
          <div class="badge-item" style="border-color: #00ff00; color: #00ff00;">HTML 4.01 Verified</div>
          <div class="badge-item" style="border-color: #ffaa00; color: #ffaa00;">Winamp Ready</div>
        </div>

        <!-- Footer -->
        <footer>
          <p>Copyright (C) 2026 AVOAS All Rights Reserved.</p>
        </footer>
      </main>
    </div>
  </div>

  <script>
    async function loadThoughtLog() {
      const contentDiv = document.getElementById('thought-markdown-content');
      try {
        const response = await fetch('content/thought.md');
        if (!response.ok) {
          throw new Error('ファイルの読み込みに失敗しました');
        }
        const text = await response.text();
        
        // Render Markdown content (marked is loaded globally)
        if (typeof marked !== 'undefined') {
          contentDiv.innerHTML = marked.parse(text);
        } else {
          // Fallback if marked didn't load
          contentDiv.innerHTML = `<pre style="white-space: pre-wrap;">${text}</pre>`;
        }
      } catch (err) {
        console.error(err);
        contentDiv.innerHTML = `<p style="color: #ff0000; text-align: center;">エラー: 思考ログの読み込みに失敗しました。<br>${err.message}</p>`;
      }
    }

    // Initial load
    loadThoughtLog();
  </script>
  <script src="assets/menu.js"></script>
</body>

</html>
